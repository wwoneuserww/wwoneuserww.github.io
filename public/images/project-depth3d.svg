<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg2)" rx="8"/>
  
  <!-- Depth image panel -->
  <rect x="20" y="20" width="150" height="130" fill="#1e293b" rx="6"/>
  <text x="30" y="40" font-size="8" fill="#94a3b8" font-family="system-ui">Depth Input</text>
  
  <!-- Depth silhouette -->
  <ellipse cx="95" cy="90" rx="25" ry="45" fill="#4b5563"/>
  <circle cx="95" cy="55" r="15" fill="#6b7280"/>
  <rect x="80" y="70" width="30" height="40" fill="#4b5563" rx="2"/>
  <rect x="75" y="110" width="15" height="30" fill="#4b5563" rx="2"/>
  <rect x="100" y="110" width="15" height="30" fill="#4b5563" rx="2"/>
  
  <!-- Arrow -->
  <path d="M180 85 L210 85" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <polygon points="210,85 205,80 205,90" fill="#3b82f6"/>
  
  <!-- 3D SMPL mesh panel -->
  <rect x="220" y="20" width="160" height="130" fill="#fff" rx="6" stroke="#e2e8f0"/>
  <text x="230" y="40" font-size="8" fill="#1e293b" font-family="system-ui">3D SMPL Output</text>
  
  <!-- 3D mesh wireframe -->
  <g transform="translate(300, 95)" stroke="#3b82f6" fill="none" stroke-width="1">
    <!-- Head -->
    <ellipse cx="0" cy="-35" rx="12" ry="15"/>
    <!-- Torso -->
    <path d="M-15,-20 L-20,25 L20,25 L15,-20 Z"/>
    <!-- Arms -->
    <path d="M-15,-15 L-35,10"/>
    <path d="M15,-15 L35,10"/>
    <!-- Legs -->
    <path d="M-10,25 L-15,60"/>
    <path d="M10,25 L15,60"/>
    <!-- Joint dots -->
    <circle cx="0" cy="-35" r="2" fill="#3b82f6"/>
    <circle cx="-15" cy="-15" r="2" fill="#3b82f6"/>
    <circle cx="15" cy="-15" r="2" fill="#3b82f6"/>
    <circle cx="-35" cy="10" r="2" fill="#3b82f6"/>
    <circle cx="35" cy="10" r="2" fill="#3b82f6"/>
    <circle cx="0" cy="0" r="2" fill="#3b82f6"/>
    <circle cx="-10" cy="25" r="2" fill="#3b82f6"/>
    <circle cx="10" cy="25" r="2" fill="#3b82f6"/>
  </g>
  
  <!-- Pipeline flow -->
  <rect x="20" y="165" width="360" height="55" fill="#fff" rx="6" stroke="#e2e8f0"/>
  
  <!-- Pipeline steps -->
  <rect x="35" y="180" width="70" height="25" fill="#f1f5f9" rx="4" stroke="#cbd5e1"/>
  <text x="45" y="196" font-size="7" fill="#475569" font-family="system-ui">PromptHMR</text>
  
  <path d="M110 192 L125 192" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="125,192 122,189 122,195" fill="#94a3b8"/>
  
  <rect x="130" y="180" width="70" height="25" fill="#f1f5f9" rx="4" stroke="#cbd5e1"/>
  <text x="137" y="196" font-size="7" fill="#475569" font-family="system-ui">Distillation</text>
  
  <path d="M205 192 L220 192" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="220,192 217,189 217,195" fill="#94a3b8"/>
  
  <rect x="225" y="180" width="70" height="25" fill="#f1f5f9" rx="4" stroke="#cbd5e1"/>
  <text x="233" y="196" font-size="7" fill="#475569" font-family="system-ui">Self-Improve</text>
  
  <path d="M300 192 L315 192" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="315,192 312,189 312,195" fill="#94a3b8"/>
  
  <rect x="320" y="180" width="50" height="25" fill="#3b82f6" rx="4"/>
  <text x="328" y="196" font-size="7" fill="#fff" font-family="system-ui">Deploy</text>
</svg>
